<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Page</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f5f7fa, #dbeafe);
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

p {
    text-align: center;
    color: gray;
    margin-bottom: 20px;
}

input, textarea, button {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

textarea {
    min-height: 100px;
    resize: vertical;
}

button {
    background: #111827;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.whatsapp {
    display: block;
    text-align: center;
    text-decoration: none;
    background: #25D366;
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>Quick Registration</h1>
    <p>Fill details below</p>

    <form action="https://docs.google.com/forms/d/15E033QdR9C8IDftMECkeXn6sPQrpmG9beICh4WglvFo/formResponse" method="POST" >

        <input type="text" name="entry.338101180" placeholder="Full Name" required>

        <input type="tel" name="entry.1054768769" placeholder="Mobile Number" required>

        <input type="email" name="entry.1526398431" placeholder="Email Address">

        <textarea name="entry.1132870992" placeholder="Your Message"></textarea>

        <button type="submit">Register Now</button>

    </form>

    <a class="whatsapp" href="https://wa.me/91YOURNUMBER?text=I want to register" target="_blank">
        Register via WhatsApp
    </a>

</div>

</body>
</html>
