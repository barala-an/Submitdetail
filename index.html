<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa, #dbeafe);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1, h2 {
            text-align: center;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 20px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: #111827;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .whatsapp {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #25D366;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
        }

        #successMessage {
            display: none;
            text-align: center;
        }

        iframe {
            display: none;
        }
    </style>
</head>

<body>

<div class="card">

    <div id="formBox">
        <h1>Quick Registration</h1>
        <p>Fill your details below</p>

        <iframe name="hidden_iframe"></iframe>

        <form
            action="https://docs.google.com/forms/d/15E033QdR9C8IDftMECkeXn6sPQrpmG9beICh4WglvFo/formResponse"
            method="POST"
            target="hidden_iframe"
            onsubmit="showMessage()">

            <input type="text" name="entry.338101180" placeholder="Full Name" required>

            <input type="tel" name="entry.1054768769" placeholder="Mobile Number" required>

            <input type="email" name="entry.1526398431" placeholder="Email Address">

            <textarea name="entry.1132870992" placeholder="Your Message"></textarea>

            <button type="submit">Register Now</button>
        </form>

        <a class="whatsapp"
           href="https://wa.me/91YOURNUMBER?text=I want to register"
           target="_blank">
           Register via WhatsApp
        </a>
    </div>

    <div id="successMessage">
        <h2>Thank You for Registering!</h2>
        <p>We have received your details successfully.</p>
    </div>

</div>

<script>
    function showMessage() {
        document.getElementById("formBox").style.display = "none";
        document.getElementById("successMessage").style.display = "block";
    }
</script>

</body>
</html>
